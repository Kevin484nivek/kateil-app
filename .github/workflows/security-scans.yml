name: Security Scans

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  sca-critical:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app
        run: npm install --no-audit --no-fund

      - name: SCA critical audit
        run: npm audit --audit-level=critical

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin v8.24.2

      - name: Secret scan
        run: |
          gitleaks detect --source . --redact --report-format json --report-path gitleaks-report.json --exit-code 1 || true

      - name: Upload secret scan report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
